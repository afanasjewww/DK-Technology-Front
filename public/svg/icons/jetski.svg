  <circle cx="20" cy="20" r="1.2" fill="currentColor"/>
  <circle cx="32" cy="18" r="1.2" fill="currentColor"/>
  <!-- Instrument cluster -->
  <rect x="24" y="21" width="4" height="2.5" rx="0.8" stroke-width="1"/>
