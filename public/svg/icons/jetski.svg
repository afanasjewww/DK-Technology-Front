  <path d="M52 32 L58 28 L60 32 L58 36 L54 36" stroke-width="1.5"/>
  <!-- Nozzle inner -->
  <line x1="56" y1="30" x2="56" y2="34" stroke-width="1" opacity="0.5"/>
